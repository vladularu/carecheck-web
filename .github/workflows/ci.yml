name: CareCheck CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Tests und Build
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: ESLint ausfuehren
        run: npm run lint

      - name: Automatische Tests ausfuehren
        run: npm run test:run

      - name: Produktions-Build erstellen
        run: npm run build
