name: CareCheck CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: carecheck-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Tests und Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: ESLint ausführen
        run: npm run lint

      - name: Automatische Tests ausführen
        run: npm run test:run

      - name: Produktions-Build erstellen
        run: npm run build